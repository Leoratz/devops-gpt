services:
  chat-api:
    build: ./backend
    ports:
      - "3000:3000"
    networks:
      - app-network

  chat-ui:
    build: ./frontend
    ports:
      - "5173:5173"
    networks:
      - app-network
    depends_on:
      - chat-api

  cache:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge